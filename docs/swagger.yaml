#Aquí ya se aplico la corrección profe, agregamos los tags para cada uno de los metodos para que la pagina de Swagger UI se vea mas organizada y .
openapi: 3.0.0
info:
  title: InterLink Estudiantil API
  version: 1.0.0
  description: API REST para conectar estudiantes con proyectos multidisciplinarios.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/auth/register:
    post:
      tags:
        - Autenticación
      summary: Registro de usuario
      requestBody:
        required: true
        content:
          application/json:
            example:
              nombre: Victor Ferrer
              correo: victor@universidad.mx
              contrasena: "123456"
              carrera: "ID_DE_CARRERA"
      responses:
        "201": { description: Usuario registrado }
        "400": { description: Datos inválidos }
  /api/auth/login:
    post:
      tags:
        - Autenticación
      summary: Inicio de sesión
      requestBody:
        required: true
        content:
          application/json:
            example:
              correo: victor@universidad.mx
              contrasena: "123456"
      responses:
        "200": { description: Login correcto y token JWT }
        "401": { description: Credenciales incorrectas }
  /api/carreras:
    get:
      tags:
        - Carreras
      summary: Listar carreras
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de carreras }
  /api/usuarios/perfil:
    get:
      tags:
        - Usuarios
      summary: Obtener perfil del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        "200": { description: Perfil del usuario }
  /api/usuarios/mis-postulaciones:
    get:
      tags:
        - Usuarios
      summary: Ver mis postulaciones
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de postulaciones del usuario }
  /api/proyectos:
    get:
      tags:
        - Proyectos
      summary: Listar proyectos con filtros y paginación
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: estado
          schema: { type: string }
        - in: query
          name: carrera
          schema: { type: string }
        - in: query
          name: buscar
          schema: { type: string }
      responses:
        "200": { description: Lista paginada de proyectos }
    post:
      tags:
        - Proyectos
      summary: Crear proyecto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              titulo: App para cafetería
              descripcion: Sistema para controlar productos y ventas.
              carreras: ["ID_CARRERA_1", "ID_CARRERA_2"]
              cupoMaximo: 3
      responses:
        "201": { description: Proyecto creado }
  /api/proyectos/{id}:
    get:
      tags:
        - Proyectos
      summary: Obtener detalle de proyecto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Proyecto encontrado }
        "404": { description: Proyecto no encontrado }
    put:
      tags:
        - Proyectos
      summary: Editar proyecto, solo creador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Proyecto actualizado }
    delete:
      tags:
        - Proyectos
      summary: Eliminar proyecto, solo creador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Proyecto eliminado }
  /api/proyectos/{id}/postulaciones:
    post:
      tags:
        - Postulaciones
      summary: Postularme a un proyecto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "201": { description: Postulación creada }
    get:
      tags:
        - Postulaciones
      summary: Ver postulaciones recibidas, solo creador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Lista de postulaciones }
  /api/proyectos/{id}/postulaciones/{postulacionId}:
    patch:
      tags:
        - Postulaciones
      summary: Aceptar o rechazar postulación, solo creador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: postulacionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            example:
              estado: Aceptada
      responses:
        "200": { description: Estado actualizado }
        "409": { description: Proyecto lleno }
  /api/proyectos/{id}/mensajes:
    get:
      tags:
        - Mensajería
      summary: Ver mensajes del proyecto, solo creador o alumno aceptado
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Lista de mensajes }
    post:
      tags:
        - Mensajería
      summary: Enviar mensaje al chat del proyecto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            example:
              contenido: Hola, me interesa colaborar en el proyecto.
      responses:
        "201": { description: Mensaje enviado }
  /api/admin/usuarios:
    get:
      tags:
        - Administración
      summary: Listar usuarios, solo administrador
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de usuarios }
  /api/admin/proyectos/{id}:
    delete:
      tags:
        - Administración
      summary: Eliminar cualquier proyecto, solo administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Proyecto eliminado }
  /api/admin/mensajes:
    get:
      tags:
        - Administración
      summary: Listar mensajes, solo administrador
      security:
        - bearerAuth: []
      responses:
        "200": { description: Lista de mensajes }
  /api/admin/mensajes/{id}:
    delete:
      tags:
        - Administración
      summary: Eliminar mensaje, solo administrador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Mensaje eliminado }
